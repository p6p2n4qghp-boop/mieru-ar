<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <title>みえる？ ARサインテスト</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>

    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Hiragino Sans",
                sans-serif;
        }

        .guide {
            position: fixed;
            left: 50%;
            bottom: 25px;
            transform: translateX(-50%);
            z-index: 9999;

            width: calc(100% - 40px);
            max-width: 420px;
            padding: 14px 18px;

            background: rgba(0, 0, 0, 0.75);
            color: white;

            text-align: center;
            font-size: 15px;
        }

        #arjs-video {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;

            width: 100vw !important;
            height: 100vh !important;

            object-fit: cover !important;
        }

        .a-canvas {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;

            width: 100vw !important;
            height: 100vh !important;
        }
    </style>
</head>

<body>

    <div class="guide" id="guide">
        HIROマーカーを映してください
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" renderer="alpha: true; antialias: true;" arjs="
            sourceType: webcam;
            debugUIEnabled: false;
            detectionMode: mono;
        ">

        <a-assets>
            <img id="sign01" src="./assets/sign01.png" crossorigin="anonymous">
        </a-assets>

        <a-marker id="hiro-marker" preset="hiro">

            <a-image src="#sign01" position="0 0.65 0" rotation="-90 0 0" width="1.6" height="0.52" material="
                    shader: flat;
                    transparent: true;
                    side: double;
                "></a-image>

        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

    <script>
        window.addEventListener("DOMContentLoaded", function () {
            const marker = document.getElementById("hiro-marker");
            const guide = document.getElementById("guide");

            marker.addEventListener("markerFound", function () {
                guide.textContent = "サイン画像を表示しています";
            });

            marker.addEventListener("markerLost", function () {
                guide.textContent = "HIROマーカーを映してください";
            });
        });
    </script>

</body>

</html>
