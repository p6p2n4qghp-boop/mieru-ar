<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <title>北泉橋 AR</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }

        .guide {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            z-index: 9999;

            width: calc(100% - 40px);
            max-width: 420px;
            padding: 12px 16px;
            box-sizing: border-box;

            border-radius: 999px;
            background: rgba(0, 0, 0, 0.72);
            color: white;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="guide">
        HIROマーカーを映してください
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" renderer="logarithmicDepthBuffer: true;"
        arjs="sourceType: webcam; debugUIEnabled: false;">

        <a-marker preset="hiro">

            <a-marker preset="hiro">

                <!-- 左 -->
                <a-entity position="-0.8 0.8 0" rotation="-90 0 0" geometry="primitive: plane; width: 1.4; height: 0.45"
                    material="color: #ffffff; side: double" text="
      value: EXHIBITION;
      align: center;
      anchor: center;
      baseline: center;
      color: #111111;
      width: 2.5;
      side: double;
    "></a-entity>

                <!-- 右 -->
                <a-entity position="0.8 0.8 0" rotation="-90 0 0" geometry="primitive: plane; width: 1.4; height: 0.45"
                    material="color: #ffffff; side: double" text="
      value: WORKSHOP;
      align: center;
      anchor: center;
      baseline: center;
      color: #111111;
      width: 2.5;
      side: double;
    "></a-entity>

                <!-- 奥 -->
                <a-entity position="0 0.8 -0.9" rotation="-90 0 0" geometry="primitive: plane; width: 1.2; height: 0.45"
                    material="color: #ffffff; side: double" text="
      value: REST;
      align: center;
      anchor: center;
      baseline: center;
      color: #111111;
      width: 2.5;
      side: double;
    "></a-entity>

            </a-marker>
            <a-entity camera></a-entity>
    </a-scene>
</body>

</html>
