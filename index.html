<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <title>みえる？ ARサインテスト</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>

    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Hiragino Sans",
                sans-serif;
        }

        .guide {
            position: fixed;
            left: 50%;
            bottom: 25px;
            transform: translateX(-50%);
            z-index: 9999;

            width: calc(100% - 40px);
            max-width: 420px;
            padding: 14px 18px;

            background: rgba(0, 0, 0, 0.75);
            color: white;

            text-align: center;
            font-size: 15px;
        }

        #arjs-video {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;

            width: 100vw !important;
            height: 100vh !important;

            object-fit: cover !important;
        }

        .a-canvas {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;

            width: 100vw !important;
            height: 100vh !important;
        }
    </style>
</head>

<body>

    <div class="guide" id="guide">
        HIROマーカーを映してください
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" renderer="alpha: true; antialias: true;" arjs="
            sourceType: webcam;
            debugUIEnabled: false;
            detectionMode: mono;
        ">

        <a-assets>
            <img id="sign01" src="./assets/sign01.png" crossorigin="anonymous">

            <img id="sign02" src="./assets/sign02.png" crossorigin="anonymous">

            <img id="sign03" src="./assets/sign03.png" crossorigin="anonymous">
        </a-assets>

        <a-marker id="hiro-marker" preset="hiro" smooth="true" smooth-count="10" smooth-tolerance="0.01"
            smooth-threshold="5">

            <!-- 01 個展 -->
            <a-image src="#sign01" position="-0.65 0.65 0.15" rotation="-90 0 -7" width="1.35" height="0.44" material="
                    shader: flat;
                    transparent: true;
                    side: double;
                "></a-image>

            <!-- 02 染色ワークショップ -->
            <a-image src="#sign02" position="0.65 0.75 -0.1" rotation="-90 0 7" width="1.55" height="0.50" material="
                    shader: flat;
                    transparent: true;
                    side: double;
                "></a-image>

            <!-- 03 休憩 -->
            <a-image src="#sign03" position="0 0.45 -0.85" rotation="-90 0 0" width="1.25" height="0.41" material="
                    shader: flat;
                    transparent: true;
                    side: double;
                "></a-image>

        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

    <script>
        window.addEventListener("DOMContentLoaded", function () {
            const marker = document.getElementById("hiro-marker");
            const guide = document.getElementById("guide");

            marker.addEventListener("markerFound", function () {
                guide.textContent = "3つのサインを表示しています";
            });

            marker.addEventListener("markerLost", function () {
                guide.textContent = "HIROマーカーを映してください";
            });
        });
    </script>

</body>

</html>
