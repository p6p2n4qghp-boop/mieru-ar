<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <title>北泉橋 ARガイド</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        .guide {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            z-index: 10;
            width: calc(100% - 40px);
            max-width: 420px;
            padding: 12px 16px;
            box-sizing: border-box;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.72);
            color: white;
            text-align: center;
            font-family: sans-serif;
        }
    </style>
</head>

<body>
    <div class="guide">
        マーカーをカメラに映してください
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" renderer="logarithmicDepthBuffer: true;"
        arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-marker preset="hiro">
            <a-plane position="0 0.65 0" rotation="-90 0 0" width="2.8" height="1.15" color="#ffffff"
                opacity="0.92"></a-plane>

            <a-text value="WORKSHOP" position="0 0.67 0.02" rotation="-90 0 0" align="center" color="#111111"
                width="4.5"></a-text>

            <a-cone position="0 0.05 0" rotation="0 0 180" radius-bottom="0.13" radius-top="0" height="0.35"
                color="#ffffff"></a-cone>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>

</html>
