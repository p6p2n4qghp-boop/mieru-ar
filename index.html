<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <title>北泉橋 ARガイド</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        .guide {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            z-index: 10;
            width: calc(100% - 40px);
            max-width: 420px;
            padding: 12px 16px;
            box-sizing: border-box;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.72);
            color: white;
            text-align: center;
            font-family: sans-serif;
        }
    </style>
</head>

<body>
    <div class="guide">
        マーカーをカメラに映してください
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" renderer="logarithmicDepthBuffer: true;"
        arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-marker preset="hiro">
            <a-marker preset="hiro">

                <a-plane position="0 0.01 0" rotation="-90 0 0" width="2.5" height="2" color="#ffffff" opacity="0">
                </a-plane>

                <!-- 個展 -->
                <a-plane position="-0.6 0.05 -0.4" width="0.8" height="0.28" color="white">
                </a-plane>

                <a-text value="📍個展" position="-0.6 0.06 -0.39" align="center" color="black" width="2">
                </a-text>

                <!-- 染色 -->
                <a-plane position="0.7 0.05 -0.1" width="0.9" height="0.28" color="white">
                </a-plane>

                <a-text value="📍染色WS" position="0.7 0.06 -0.09" align="center" color="black" width="2">
                </a-text>

                <!-- 休憩 -->
                <a-plane position="0.1 0.05 0.7" width="0.8" height="0.28" color="white">
                </a-plane>

                <a-text value="☕休憩" position="0.1 0.06 0.71" align="center" color="black" width="2">
                </a-text>

            </a-marker>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>

</html>
